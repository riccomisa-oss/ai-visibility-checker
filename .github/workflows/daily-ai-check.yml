name: Daily AI Visibility Check

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 00:00 UTC = 09:00 KST
  workflow_dispatch:        # GitHub Actions UI에서 수동 실행 가능

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # data/ 디렉토리를 커밋하기 위해 필요

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: AI 노출 체크 실행
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CLOVAX_API_KEY: ${{ secrets.CLOVAX_API_KEY }}
        run: python -m checker.main

      - name: 결과 데이터 커밋 & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: AI 노출 데이터 업데이트 $(date +'%Y-%m-%d')"
          git push
